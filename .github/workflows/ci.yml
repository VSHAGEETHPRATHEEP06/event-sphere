name: EventSphere CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # Lint and Test
  # ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, event-service, booking-service, payment-service, notification-service]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd services/${{ matrix.service }}
          npm ci

      - name: Check for syntax errors
        run: |
          cd services/${{ matrix.service }}
          node -c src/index.js

  # ──────────────────────────────────────────────
  # Build Frontend
  # ──────────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install and build frontend
        run: |
          cd frontend
          npm ci
          npm run build

  # ──────────────────────────────────────────────
  # Build Docker Images
  # ──────────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: [test, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker-compose build

      - name: Verify Docker Compose config
        run: docker-compose config --quiet
