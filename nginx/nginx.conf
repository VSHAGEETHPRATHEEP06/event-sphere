worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ──────────────────────────────────────────────
    # Logging
    # ──────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript text/xml;

    # ──────────────────────────────────────────────
    # Rate Limiting
    # ──────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    # ──────────────────────────────────────────────
    # Upstream (for scaling)
    # ──────────────────────────────────────────────
    upstream auth_service {
        server auth-service:3001;
    }

    upstream event_service {
        server event-service:3002;
    }

    upstream booking_service {
        server booking-service:3003;
    }

    upstream payment_service {
        server payment-service:3004;
    }

    # ──────────────────────────────────────────────
    # Server
    # ──────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ──────────────────────────────────────────
        # Frontend (React SPA)
        # ──────────────────────────────────────────
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # ──────────────────────────────────────────
        # Auth Service API
        # ──────────────────────────────────────────
        location /api/auth/ {
            limit_req zone=auth_limit burst=10 nodelay;
            proxy_pass http://auth_service/api/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ──────────────────────────────────────────
        # Event Service API
        # ──────────────────────────────────────────
        location /api/events {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://event_service/api/events;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ──────────────────────────────────────────
        # Booking Service API
        # ──────────────────────────────────────────
        location /api/bookings {
            limit_req zone=api_limit burst=15 nodelay;
            proxy_pass http://booking_service/api/bookings;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ──────────────────────────────────────────
        # Payment Service API
        # ──────────────────────────────────────────
        location /api/payments {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://payment_service/api/payments;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ──────────────────────────────────────────
        # Health Check
        # ──────────────────────────────────────────
        location /health {
            return 200 '{"status":"ok","service":"api-gateway"}';
            add_header Content-Type application/json;
        }
    }
}
