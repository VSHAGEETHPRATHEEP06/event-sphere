# EventSphere — Cloud-Native Event Ticket Booking Platform
services:
  # ──────────────────────────────────────────────
  # API Gateway
  # ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: eventsphere-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      auth-service:
        condition: service_healthy
      event-service:
        condition: service_healthy
      booking-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    networks:
      - eventsphere-network
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Databases
  # ──────────────────────────────────────────────
  postgres-auth:
    image: postgres:15-alpine
    container_name: eventsphere-db-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: ${DB_USER:-eventsphere}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-eventsphere_secret}
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
      - ./services/auth-service/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - eventsphere-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventsphere -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres-event:
    image: postgres:15-alpine
    container_name: eventsphere-db-event
    environment:
      POSTGRES_DB: event_db
      POSTGRES_USER: ${DB_USER:-eventsphere}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-eventsphere_secret}
    volumes:
      - postgres-event-data:/var/lib/postgresql/data
      - ./services/event-service/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - eventsphere-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventsphere -d event_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres-booking:
    image: postgres:15-alpine
    container_name: eventsphere-db-booking
    environment:
      POSTGRES_DB: booking_db
      POSTGRES_USER: ${DB_USER:-eventsphere}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-eventsphere_secret}
    volumes:
      - postgres-booking-data:/var/lib/postgresql/data
      - ./services/booking-service/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - eventsphere-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventsphere -d booking_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres-payment:
    image: postgres:15-alpine
    container_name: eventsphere-db-payment
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: ${DB_USER:-eventsphere}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-eventsphere_secret}
    volumes:
      - postgres-payment-data:/var/lib/postgresql/data
      - ./services/payment-service/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - eventsphere-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventsphere -d payment_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Redis (Cache + Seat Locking)
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: eventsphere-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis-data:/data
    networks:
      - eventsphere-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secret", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # RabbitMQ (Message Broker)
  # ──────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: eventsphere-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-eventsphere}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbitmq_secret}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - eventsphere-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Auth Service
  # ──────────────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: eventsphere-auth
    environment:
      PORT: 3001
      DB_HOST: postgres-auth
      DB_PORT: 5432
      DB_NAME: auth_db
      DB_USER: ${DB_USER:-eventsphere}
      DB_PASSWORD: ${DB_PASSWORD:-eventsphere_secret}
      JWT_SECRET: ${JWT_SECRET:-eventsphere_jwt_super_secret_key_2026}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
    depends_on:
      postgres-auth:
        condition: service_healthy
    networks:
      - eventsphere-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Event Service
  # ──────────────────────────────────────────────
  event-service:
    build:
      context: ./services/event-service
      dockerfile: Dockerfile
    container_name: eventsphere-event
    environment:
      PORT: 3002
      DB_HOST: postgres-event
      DB_PORT: 5432
      DB_NAME: event_db
      DB_USER: ${DB_USER:-eventsphere}
      DB_PASSWORD: ${DB_PASSWORD:-eventsphere_secret}
      JWT_SECRET: ${JWT_SECRET:-eventsphere_jwt_super_secret_key_2026}
    depends_on:
      postgres-event:
        condition: service_healthy
    networks:
      - eventsphere-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Booking Service
  # ──────────────────────────────────────────────
  booking-service:
    build:
      context: ./services/booking-service
      dockerfile: Dockerfile
    container_name: eventsphere-booking
    environment:
      PORT: 3003
      DB_HOST: postgres-booking
      DB_PORT: 5432
      DB_NAME: booking_db
      DB_USER: ${DB_USER:-eventsphere}
      DB_PASSWORD: ${DB_PASSWORD:-eventsphere_secret}
      JWT_SECRET: ${JWT_SECRET:-eventsphere_jwt_super_secret_key_2026}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-eventsphere}:${RABBITMQ_PASSWORD:-rabbitmq_secret}@rabbitmq:5672
      EVENT_SERVICE_URL: http://event-service:3002
    depends_on:
      postgres-booking:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - eventsphere-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Payment Service
  # ──────────────────────────────────────────────
  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    container_name: eventsphere-payment
    environment:
      PORT: 3004
      DB_HOST: postgres-payment
      DB_PORT: 5432
      DB_NAME: payment_db
      DB_USER: ${DB_USER:-eventsphere}
      DB_PASSWORD: ${DB_PASSWORD:-eventsphere_secret}
      JWT_SECRET: ${JWT_SECRET:-eventsphere_jwt_super_secret_key_2026}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-eventsphere}:${RABBITMQ_PASSWORD:-rabbitmq_secret}@rabbitmq:5672
    depends_on:
      postgres-payment:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - eventsphere-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3004/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # Notification Service
  # ──────────────────────────────────────────────
  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: eventsphere-notification
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-eventsphere}:${RABBITMQ_PASSWORD:-rabbitmq_secret}@rabbitmq:5672
      SMTP_HOST: ${SMTP_HOST:-smtp.ethereal.email}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@eventsphere.com}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - eventsphere-network
    restart: unless-stopped

# ──────────────────────────────────────────────
# Volumes
# ──────────────────────────────────────────────
volumes:
  postgres-auth-data:
  postgres-event-data:
  postgres-booking-data:
  postgres-payment-data:
  redis-data:
  rabbitmq-data:

# ──────────────────────────────────────────────
# Networks
# ──────────────────────────────────────────────
networks:
  eventsphere-network:
    driver: bridge
